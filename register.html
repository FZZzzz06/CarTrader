<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Registration — CarTrader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }

    .top-nav {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-nav .logo {
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .top-nav .nav-links {
      display: flex;
      gap: 32px;
    }

    .top-nav .nav-links a {
      color: #555;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .top-nav .nav-links a:hover {
      color: #667eea;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      display: flex;
      width: 100%;
      max-width: 1000px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.25);
    }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
    }

    .left-panel h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .left-panel p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .right-panel {
      flex: 1;
      padding: 50px;
    }

    .form-header {
      margin-bottom: 32px;
    }

    .form-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 13px;
      color: #444;
    }

    .req {
      color: #e74c3c;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s;
      background: #fafafa;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    input.error {
      border-color: #e74c3c;
    }

    .err-msg {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 6px;
      display: none;
    }

    .err-msg.show {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .tip {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-top: 24px;
    }

    .tip a {
      color: #667eea;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .top-nav {
        padding: 16px 20px;
      }
      .nav-links {
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="homepage.html" class="logo">CarTrader</a>
    <div class="nav-links">
      <a href="homepage.html">Home</a>
      <a href="seller-portal.html">Seller Portal</a>
      <a href="searchpage.html">Search</a>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="left-panel">
        <h2>Join CarTrader Today</h2>
        <p>Start selling your vehicles to thousands of potential buyers.</p>
        <div class="features">
          <div class="feature"><div class="feature-icon">🚗</div><span>List unlimited vehicles</span></div>
          <div class="feature"><div class="feature-icon">📊</div><span>Track your listings</span></div>
          <div class="feature"><div class="feature-icon">🔒</div><span>Secure transactions</span></div>
        </div>
      </div>

      <div class="right-panel">
        <div class="form-header">
          <h1>Create Account</h1>
          <p>Fill in your details to become a seller</p>
        </div>

        <form id="regForm">
          <div class="form-group">
            <label>Full Name<span class="req">*</span></label>
            <input type="text" id="fullName" placeholder="Enter your full name">
            <div class="err-msg" id="e-fullName"></div>
          </div>

          <div class="form-group">
            <label>Address<span class="req">*</span></label>
            <input type="text" id="address" placeholder="Your address">
            <div class="err-msg" id="e-address"></div>
          </div>

          <div class="form-group">
            <label>Phone Number<span class="req">*</span></label>
            <input type="tel" id="phone" placeholder="1XXXXXXXXXX" maxlength="11">
            <div class="err-msg" id="e-phone"></div>
          </div>

          <div class="form-group">
            <label>Email<span class="req">*</span></label>
            <input type="email" id="email" placeholder="example@mail.com">
            <div class="err-msg" id="e-email"></div>
          </div>

          <div class="form-group">
            <label>Username<span class="req">*</span></label>
            <input type="text" id="username" placeholder="At least 6 characters">
            <div class="err-msg" id="e-username"></div>
          </div>

          <div class="form-group">
            <label>Password<span class="req">*</span></label>
            <input type="password" id="password" placeholder="At least 6 characters">
            <div class="err-msg" id="e-password"></div>
          </div>

          <div class="form-group">
            <label><input type="checkbox" id="agree"> I agree to the Terms</label>
            <div class="err-msg" id="e-agree"></div>
          </div>

          <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="tip">Already have an account? <a href="login.html">Sign in</a></div>
      </div>
    </div>
  </main>

  <script>
    const regex = {
      name: /^[a-zA-Z\s]{1,50}$/,
      address: /^[a-zA-Z0-9\s]{5,200}$/,
      phone: /^1[3-9]\d{9}$/,
      email: /^[a-zA-Z0-9_.+-]{1,50}@[a-zA-Z0-9.-]+\.(com|cn)$/i,
      userpass: /^[a-zA-Z0-9]{6,30}$/
    };

    function validate(inputId, errId, regex, msg) {
      const val = document.getElementById(inputId).value.trim();
      const err = document.getElementById(errId);
      if (!val) {
        err.textContent = msg + " is required";
        err.classList.add("show");
        return false;
      }
      if (!regex.test(val)) {
        err.textContent = "Invalid " + msg.toLowerCase();
        err.classList.add("show");
        return false;
      }
      err.classList.remove("show");
      return true;
    }

    // Check if username already exists
    function isUsernameTaken(username) {
      const users = JSON.parse(localStorage.getItem("users") || "[]");
      return users.some(user => user.username === username);
    }

    document.getElementById("regForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      const valid = validate("fullName", "e-fullName", regex.name, "Full name") &&
                    validate("address", "e-address", regex.address, "Address") &&
                    validate("phone", "e-phone", regex.phone, "Phone") &&
                    validate("email", "e-email", regex.email, "Email") &&
                    validate("username", "e-username", regex.userpass, "Username") &&
                    validate("password", "e-password", regex.userpass, "Password");
      
      const username = document.getElementById("username").value.trim();
      
      if (valid && isUsernameTaken(username)) {
        document.getElementById("e-username").textContent = "Username already exists";
        document.getElementById("e-username").classList.add("show");
        return;
      }
      
      const agree = document.getElementById("agree").checked;
      if (!agree) {
        document.getElementById("e-agree").textContent = "Please agree to terms";
        document.getElementById("e-agree").classList.add("show");
        return;
      }
      
      if (valid && agree) {
        // Save user to localStorage
        const newUser = {
          fullName: document.getElementById("fullName").value.trim(),
          address: document.getElementById("address").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim(),
          username: username,
          password: document.getElementById("password").value.trim()
        };
        
        const users = JSON.parse(localStorage.getItem("users") || "[]");
        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));
        
        alert("Registration successful! Please login.");
        window.location.href = "login.html";
      }
    });
  </script>
</body>
</html>
